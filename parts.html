<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pièces Capucino</title>
    <meta name="description" content="Toutes les pièces Capucino.">
    <link rel="icon" href="./Database/MotorPictures/Capucino.png">
    <link rel="stylesheet" href="./assets/css/styles.css">
  </head>
  <body data-page="parts">
    <div class="site-backdrop" aria-hidden="true">
      <span class="site-backdrop__orb site-backdrop__orb--one"></span>
      <span class="site-backdrop__orb site-backdrop__orb--two"></span>
      <span class="site-backdrop__grid"></span>
    </div>

    <main class="simple-page simple-page--parts">
      <div class="price-notice" data-i18n="price_notice">Les prix sont basés sur les données de 2023 ; le devis final fait foi.</div>

      <header class="top-strip panel-surface panel-surface--header">
        <div class="top-strip__slot top-strip__slot--left">
          <a class="top-box top-box--yellow" href="./index.html" data-i18n="back_models">Retour aux modèles</a>
        </div>
        <div class="top-strip__slot top-strip__slot--center">
          <div class="lang-switch" data-lang-switcher>
            <button class="lang-switch__button" type="button" data-lang="en">English</button>
            <button class="lang-switch__button" type="button" data-lang="fr">Français</button>
            <button class="lang-switch__button" type="button" data-lang="ar">العربية</button>
          </div>
        </div>
        <div class="top-strip__slot top-strip__slot--right">
          <button class="top-box top-box--cyan" type="button" id="page-submit" data-i18n="send_whatsapp">
            Envoyer sur WhatsApp
          </button>
        </div>
      </header>

      <section class="search-row panel-surface panel-surface--search">
        <label class="search-row__label" for="parts-search" data-i18n="search_label">Recherche</label>
        <div class="search-row__field">
          <svg class="search-row__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.5 4a6.5 6.5 0 1 0 4.06 11.58l4.43 4.43 1.41-1.41-4.43-4.43A6.5 6.5 0 0 0 10.5 4Zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9Z" fill="currentColor"/>
          </svg>
          <input
            id="parts-search"
            class="search-row__input"
            type="search"
            placeholder="Rechercher un nom ou un code"
            data-i18n-placeholder="search_placeholder"
          >
        </div>
      </section>

      <section class="parts-list" id="parts-list" aria-live="polite"></section>
      <section class="empty-state panel-surface" id="parts-empty" hidden data-i18n="no_parts">Aucune pièce.</section>
      <div class="list-footer" id="parts-loading" data-i18n="loading">Chargement...</div>
      <div id="parts-sentinel" class="list-sentinel" aria-hidden="true"></div>
    </main>

    <div id="toast-root"></div>
    <script src="./data/parts-data.js?v=20260511-price3"></script>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
